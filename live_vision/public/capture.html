<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Vision 911 — Capture Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #ff4444;
      text-transform: uppercase;
    }

    #controls {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 8px 20px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #e0e0e0;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    button:hover { background: #2a2a2a; }
    button:disabled { opacity: 0.35; cursor: default; }

    #status {
      font-size: 0.75rem;
      color: #888;
      height: 1.2em;
    }

    #video {
      width: 480px;
      max-width: 100%;
      border: 1px solid #333;
    }

    canvas { display: none; }

    #result-panel {
      width: 480px;
      max-width: 100%;
    }

    #result-panel h2 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #result-box {
      background: #111;
      border: 1px solid #333;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 200px;
      max-height: 420px;
      overflow-y: auto;
    }

    .field-high    { color: #ff4444; }
    .field-moderate { color: #ffaa44; }
    .field-ok      { color: #44ff88; }
    .field-label   { color: #888; }

    #log {
      width: 480px;
      max-width: 100%;
    }

    #log h2 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #log-box {
      background: #111;
      border: 1px solid #333;
      padding: 12px;
      font-size: 0.72rem;
      line-height: 1.5;
      max-height: 180px;
      overflow-y: auto;
      color: #666;
    }

    #log-box .entry { margin-bottom: 2px; }
    #log-box .entry.err { color: #ff6666; }

    #audio-section {
      width: 480px;
      max-width: 100%;
    }

    #audio-section h2 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #audio-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #mic-status {
      font-size: 0.72rem;
      color: #666;
      margin-bottom: 8px;
      height: 1.2em;
    }

    .audio-row {
      margin-bottom: 8px;
    }

    .audio-row label {
      display: block;
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .audio-value {
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 6px 10px;
      font-size: 0.78rem;
      min-height: 2em;
      color: #ccc;
    }

    .audio-value.highlight { color: #44ff88; }
    .btn-recording { border-color: #ff4444 !important; color: #ff4444 !important; }
  </style>
</head>
<body>
  <h1>Live Vision 911 — Capture Test</h1>

  <div id="controls">
    <button id="btn-start">Start Camera</button>
    <button id="btn-stop" disabled>Stop</button>
  </div>

  <div id="status">idle</div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="result-panel">
    <h2>Latest Frame Analysis</h2>
    <div id="result-box">—</div>
  </div>

  <div id="log">
    <h2>Frame Log</h2>
    <div id="log-box"></div>
  </div>

  <div id="audio-section">
    <h2>Audio — Language Detection &amp; Translation</h2>
    <div id="audio-controls">
      <button id="btn-detect-lang">Detect Language</button>
      <button id="btn-translate" disabled>Translate to English</button>
    </div>
    <div id="mic-status">idle</div>
    <div class="audio-row">
      <label>Transcript (what was heard)</label>
      <div class="audio-value" id="transcript-box">—</div>
    </div>
    <div class="audio-row">
      <label>Detected Language</label>
      <div class="audio-value highlight" id="lang-box">—</div>
    </div>
    <div class="audio-row">
      <label>English Translation</label>
      <div class="audio-value" id="translation-box">—</div>
    </div>
  </div>

  <script>
    const video   = document.getElementById("video");
    const canvas  = document.getElementById("canvas");
    const ctx     = canvas.getContext("2d");
    const resultBox = document.getElementById("result-box");
    const logBox    = document.getElementById("log-box");
    const statusEl  = document.getElementById("status");
    const btnStart  = document.getElementById("btn-start");
    const btnStop   = document.getElementById("btn-stop");

    const INTERVAL_MS = 2000;
    const JPEG_QUALITY = 0.7;

    let stream = null;
    let intervalId = null;
    let frameCount = 0;
    let pendingRequest = false;

    function setStatus(msg) { statusEl.textContent = msg; }

    function addLog(msg, isErr = false) {
      const el = document.createElement("div");
      el.className = "entry" + (isErr ? " err" : "");
      el.textContent = msg;
      logBox.prepend(el);
      // Keep last 50 entries
      while (logBox.children.length > 50) logBox.removeChild(logBox.lastChild);
    }

    function severityClass(val) {
      if (val === "high")     return "field-high";
      if (val === "moderate") return "field-moderate";
      return "field-ok";
    }

    function label(text) {
      return `<span class="field-label">${text}</span>`;
    }

    function renderResult(r) {
      const lines = [];

      const qClass = r.frame_quality === "usable" ? "field-ok" : "field-moderate";
      lines.push(`${label("frame_quality  ")} <span class="${qClass}">${r.frame_quality}</span>   ${label("confidence")} ${(r.confidence * 100).toFixed(0)}%`);

      // Scene
      if (r.scene) {
        const s = r.scene;
        lines.push("");
        lines.push(`${label("── SCENE ──────────────────────────────")}`);
        lines.push(`${label("environment    ")} ${s.environment ?? "—"}   ${label("location")} ${s.location_type ?? "—"}`);
        lines.push(`${label("lighting       ")} ${s.lighting ?? "—"}   ${label("weather")} ${s.weather ?? "—"}`);
        if (s.structural_damage_visible) {
          lines.push(`${label("structure dmg  ")} <span class="field-high">YES — ${s.structural_damage_description ?? "visible"}</span>`);
        }
      }

      // People
      if (r.people && r.people.length) {
        lines.push("");
        lines.push(`${label("── PEOPLE (" + r.people.length + ") ─────────────────────────")}`);
        r.people.forEach(p => {
          const distClass = p.distress_level === "severe" ? "field-high"
                          : p.distress_level === "moderate" ? "field-moderate" : "field-ok";
          const respClass = p.responsive === "unresponsive" ? "field-high" : "field-ok";
          lines.push(`${label("  [" + p.id + "] ")}${p.age_estimate} · ${p.position} · ${p.motion} · role: ${p.role_estimate}`);
          lines.push(`      ${label("responsive")} <span class="${respClass}">${p.responsive}</span>   ${label("distress")} <span class="${distClass}">${p.distress_level ?? "—"}</span>`);
        });
      } else {
        lines.push(`${label("people         ")} none detected`);
      }

      // Injuries
      if (r.injuries && r.injuries.length) {
        lines.push("");
        lines.push(`${label("── INJURIES ────────────────────────────")}`);
        r.injuries.forEach(inj => {
          const sevClass = severityClass(inj.severity);
          const bleedTxt = inj.bleeding ? " <span class='field-high'>+ bleeding</span>" : "";
          lines.push(`  ${label("person " + inj.person_id)} <span class="${sevClass}">${inj.injury_type}</span> · ${inj.body_part ?? "unknown location"} · sev: <span class="${sevClass}">${inj.severity}</span>${bleedTxt}`);
        });
      }

      // Objects
      if (r.objects) {
        const obj = r.objects;
        const hasObj = obj.vehicles?.length || obj.weapons_visible || obj.medical_equipment_visible || obj.notable_objects?.length;
        if (hasObj) {
          lines.push("");
          lines.push(`${label("── OBJECTS ─────────────────────────────")}`);
          if (obj.vehicles?.length) {
            const dmg = obj.vehicle_damage_visible ? " <span class='field-high'>(damaged)</span>" : "";
            lines.push(`  ${label("vehicles       ")} ${obj.vehicles.join(", ")}${dmg}`);
          }
          if (obj.weapons_visible) {
            lines.push(`  ${label("weapons        ")} <span class="field-high">${obj.weapon_types?.join(", ") || "visible"}</span>`);
          }
          if (obj.medical_equipment_visible) {
            lines.push(`  ${label("medical equip  ")} ${obj.medical_equipment_types?.join(", ") || "visible"}`);
          }
          if (obj.notable_objects?.length) {
            lines.push(`  ${label("notable        ")} ${obj.notable_objects.join(", ")}`);
          }
        }
      }

      // Hazards / Fire / Smoke
      const hazards = r.hazards?.length ? r.hazards.join(", ") : "none";
      const hazClass = r.hazards?.length ? "field-high" : "field-ok";
      const fireClass = (r.fire_visible || r.smoke_visible) ? "field-high" : "field-ok";
      lines.push("");
      lines.push(`${label("── HAZARDS ─────────────────────────────")}`);
      lines.push(`  ${label("fire / smoke   ")} <span class="${fireClass}">${r.fire_visible} / ${r.smoke_visible}</span>`);
      lines.push(`  ${label("hazards        ")} <span class="${hazClass}">${hazards}</span>`);

      if (r.quality_issues?.length) {
        lines.push(`  ${label("quality issues  ")} ${r.quality_issues.join(", ")}`);
      }

      if (r.notes) lines.push(`\n${label("notes: ")}${r.notes}`);
      lines.push(`${label("timestamp: ")}${r.timestamp}`);

      resultBox.innerHTML = lines.join("\n");
    }

    async function captureAndSend() {
      if (pendingRequest) {
        addLog("skipped — previous request still in flight");
        return;
      }

      if (!video.videoWidth || !video.videoHeight || video.readyState < 2) {
        addLog("skipped — video not ready yet");
        return;
      }

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
      // Strip the data URI prefix
      const base64 = dataUrl.split(",")[1];

      frameCount++;
      const fc = frameCount;
      setStatus(`frame ${fc} — sending…`);
      pendingRequest = true;

      try {
        const resp = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ frame: base64, mimeType: "image/jpeg" }),
        });

        const body = await resp.json();
        pendingRequest = false;

        if (body.ok) {
          renderResult(body.result);
          addLog(`frame ${fc} — quality=${body.result.frame_quality} conf=${(body.result.confidence * 100).toFixed(0)}%`);
          setStatus(`frame ${fc} — ok`);
        } else {
          addLog(`frame ${fc} — error: ${body.error}`, true);
          setStatus(`frame ${fc} — error (see log)`);
        }
      } catch (err) {
        pendingRequest = false;
        addLog(`frame ${fc} — fetch failed: ${err.message}`, true);
        setStatus(`frame ${fc} — fetch error`);
      }
    }

    async function startCapture() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
        // autoplay attribute handles play; explicit call can throw AbortError mid-load
        video.play().catch(() => {});

        btnStart.disabled = true;
        btnStop.disabled  = false;
        setStatus("capturing — first frame in 2s…");
        addLog("camera started");

        intervalId = setInterval(captureAndSend, INTERVAL_MS);
      } catch (err) {
        setStatus(`camera error: ${err.message}`);
        addLog(`camera error: ${err.message}`, true);
      }
    }

    function stopCapture() {
      clearInterval(intervalId);
      intervalId = null;

      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      video.srcObject = null;
      btnStart.disabled = false;
      btnStop.disabled  = true;
      setStatus("stopped");
      addLog("capture stopped");
    }

    btnStart.addEventListener("click", startCapture);
    btnStop.addEventListener("click",  stopCapture);

    // --- Audio: language detection + translation ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const btnDetect      = document.getElementById("btn-detect-lang");
    const btnTranslate   = document.getElementById("btn-translate");
    const transcriptBox  = document.getElementById("transcript-box");
    const langBox        = document.getElementById("lang-box");
    const translationBox = document.getElementById("translation-box");
    const micStatus      = document.getElementById("mic-status");

    let capturedTranscript = "";
    let detectedLanguage   = "";

    function setMicStatus(msg) { micStatus.textContent = msg; }

    function startListening() {
      if (!SpeechRecognition) {
        setMicStatus("Speech recognition not supported — use Chrome or Edge");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.continuous    = false;
      recognition.interimResults = false;
      // Omit lang so the browser uses its configured default

      btnDetect.disabled = true;
      btnDetect.classList.add("btn-recording");
      btnTranslate.disabled = true;
      transcriptBox.textContent  = "";
      langBox.textContent        = "—";
      translationBox.textContent = "—";
      setMicStatus("listening — speak now…");

      recognition.onresult = async (e) => {
        capturedTranscript = e.results[0][0].transcript;
        transcriptBox.textContent = capturedTranscript;
        setMicStatus("detecting language…");

        try {
          const resp = await fetch("/detect-language", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: capturedTranscript }),
          });
          const data = await resp.json();
          detectedLanguage = data.language || "Unknown";
          langBox.textContent = `${data.language} (${data.language_code}) — ${Math.round((data.confidence || 0) * 100)}% confidence`;
          // Only enable translate if not already English
          btnTranslate.disabled = (data.language_code === "en");
          setMicStatus("done — click Translate to English if needed");
        } catch (err) {
          setMicStatus(`detection error: ${err.message}`);
        }

        btnDetect.disabled = false;
        btnDetect.classList.remove("btn-recording");
      };

      recognition.onerror = (e) => {
        setMicStatus(`mic error: ${e.error}`);
        btnDetect.disabled = false;
        btnDetect.classList.remove("btn-recording");
      };

      recognition.onend = () => {
        btnDetect.classList.remove("btn-recording");
        btnDetect.disabled = false;
        if (!capturedTranscript) setMicStatus("no speech detected — try again");
      };

      recognition.start();
    }

    async function translateText() {
      if (!capturedTranscript) return;
      btnTranslate.disabled = true;
      translationBox.textContent = "translating…";

      try {
        const resp = await fetch("/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: capturedTranscript, from_language: detectedLanguage }),
        });
        const data = await resp.json();
        translationBox.textContent = data.translation || "(empty)";
      } catch (err) {
        translationBox.textContent = `error: ${err.message}`;
      }

      btnTranslate.disabled = false;
    }

    btnDetect.addEventListener("click",    startListening);
    btnTranslate.addEventListener("click", translateText);
  </script>
</body>
</html>
